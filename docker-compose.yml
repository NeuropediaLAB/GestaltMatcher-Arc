services:
  # GestaltMatcher REST API Service
  gm-api:
    build:
      context: .
      dockerfile: Dockerfile.rpi5
    container_name: gestaltmatcher-api
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./config.json:/app/config.json
      - ./output:/app/output
    restart: unless-stopped
    networks:
      - gestaltmatcher-network
    mem_limit: 2g
    cpus: 2.0

  # GestaltMatcher Web Interface (Streamlit)
  gm-web:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: gestaltmatcher-web
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./config.json:/app/config.json
      - ./data/cases:/app/data/cases
      - ./data/cases_align:/app/data/cases_align
      - ./data/encodings:/app/data/encodings
      - ./output:/app/output
    restart: unless-stopped
    networks:
      - gestaltmatcher-network
    mem_limit: 2g
    cpus: 2.0
    depends_on:
      - gm-api

networks:
  gestaltmatcher-network:
    driver: bridge

volumes:
  output:
